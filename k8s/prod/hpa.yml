apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: academico-login
  namespace: academico-prod
  labels:
    app.kubernetes.io/name: academico-login
    app.kubernetes.io/part-of: academico
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: academico-login
  minReplicas: 1
  maxReplicas: 2
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
