apiVersion: v1
kind: Service
metadata:
  name: academico-login
  namespace: academico-prod
  labels:
    app.kubernetes.io/name: academico-login
    app.kubernetes.io/part-of: academico
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: academico-login
  ports:
    - name: grpc
      port: 3001
      targetPort: grpc
      nodePort: 30001
      protocol: TCP
