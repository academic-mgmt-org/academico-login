syntax = "proto3";
package auth.v1;

message LoginRequest {
  string username = 1;
  string password = 2;
  string app_version = 3;
  string password_encoding = 4;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  bool mfa_required = 3;
  bool requires_app_update = 4;
  string token_type = 5;
  int32 expires_in = 6;
  string session_id = 7;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message ForgotPasswordRequest {
  string email = 1;
}

message ResetPasswordRequest {
  string token = 1;
  string email = 2;
  string new_password = 3;
  string password_encoding = 4;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool is_valid = 1;
  string identifier = 2;
  string email = 3;
  string session_id = 4;
  string user_id = 5;
  string role = 6;
  repeated ApplicationAccess applications = 7;
}

message LogoutRequest {
  string token = 1;
  string refresh_token = 2;
}

message TokenValidityResponse {
  bool is_valid = 1;
}

message GenericResponse {
  bool success = 1;
  string message = 2;
  bool revoked = 3;
}

message Empty {}

message WhitelistResponse {
  repeated string routes = 1;
}

message HealthResponse {
  string status = 1;
  string service = 2;
  string timestamp = 3;
  double uptime = 4;
}

message ReadyResponse {
  bool ready = 1;
  string timestamp = 2;
}

message LiveResponse {
  bool alive = 1;
  string timestamp = 2;
  double uptime = 3;
}

message ApplicationAccess {
  string app_name = 1;
  repeated RoleAccess roles = 2;
}

message RoleAccess {
  string role_name = 1;
  repeated string permissions = 2;
}

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc RefreshToken(RefreshTokenRequest) returns (LoginResponse) {}
  rpc ForgotPassword(ForgotPasswordRequest) returns (GenericResponse) {}
  rpc ResetPassword(ResetPasswordRequest) returns (GenericResponse) {}
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse) {}
  rpc ValidateTokenSimple(ValidateTokenRequest) returns (TokenValidityResponse) {}
  rpc ValidateTokenWithHeader(Empty) returns (ValidateTokenResponse) {}
  rpc Logout(LogoutRequest) returns (GenericResponse) {}
}

service WhitelistService {
  rpc GetAll(Empty) returns (WhitelistResponse) {}
}

service HealthService {
  rpc Health(Empty) returns (HealthResponse) {}
  rpc Ready(Empty) returns (ReadyResponse) {}
  rpc Live(Empty) returns (LiveResponse) {}
}
