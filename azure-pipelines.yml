# Docker
# Build and push an image to Azure Container Registry

trigger:
- main

resources:
- repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: '5cffc302-0a35-4b2b-8ea1-04a9ebd67c07'
  imageRepository: 'academicmgmtorgacademicologin'
  containerRegistry: 'acracademicoutn.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

  # Container name on your personal server
  containerName: 'academico-login'
  devAgentPool: 'Default'
  devAgentName: 'self-hosted-agent'
  devRemoteAppPath: '/home/azureuser/academico-login'
  devComposeFile: 'docker-compose.yml'
  prodSshHost: '20.115.132.131'
  prodSshUser: 'azureuser'
  prodRemoteAppPath: '/home/azureuser/academico-login'
  prodComposeFile: 'docker-compose.yml'
  prodDbCredentialsFile: '/home/azureuser/academico-prod-db-credentials.txt'
  servicePort: '3001'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
        addPipelineData: false

- stage: DeployDevelopment
  displayName: Deploy to development
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: DeployDevelopment
    displayName: Deploy Docker Compose on development server
    pool:
      name: $(devAgentPool)
      demands:
      - Agent.Name -equals $(devAgentName)
    steps:
    - task: Docker@2
      displayName: Login to Azure Container Registry
      inputs:
        command: login
        containerRegistry: $(dockerRegistryServiceConnection)

    - script: |
        set -euo pipefail

        require_env() {
          local name="$1"
          if [ -z "${!name:-}" ]; then
            echo "Missing required environment variable: $name"
            exit 1
          fi
        }

        for name in DEFAULT_SERVICE_PORT LOGIN_API_KEY JWT_SECRET JWT_DOC_SECRET JWT_ACCESS_TTL JWT_REFRESH_TTL DB_HOST DB_PORT DB_DATABASE DB_USER DB_PASSWORD; do
          require_env "$name"
        done

        IMAGE="${CONTAINER_REGISTRY}/${IMAGE_REPOSITORY}:${TAG}"
        ENV_FILE_LOCAL="$(mktemp)"

        cleanup() {
          rm -f "$ENV_FILE_LOCAL"
        }
        trap cleanup EXIT

        if [ ! -f "$COMPOSE_SOURCE_FILE" ]; then
          echo "Missing compose source file: $COMPOSE_SOURCE_FILE"
          exit 1
        fi

        mkdir -p "$REMOTE_APP_PATH"

        echo "Reading development service port..."
        ENV_FILE="$REMOTE_APP_PATH/.env"
        SERVICE_PORT=""
        if [ -f "$ENV_FILE" ]; then
          SERVICE_PORT="$(sed -n 's/^PORT=//p' "$ENV_FILE" | tail -n 1)"
        fi

        if [ -z "$SERVICE_PORT" ]; then
          echo "No PORT found in $ENV_FILE. Using pipeline default port $DEFAULT_SERVICE_PORT."
          SERVICE_PORT="$DEFAULT_SERVICE_PORT"
        fi

        if [[ ! "$SERVICE_PORT" =~ ^[0-9]+$ ]]; then
          echo "Invalid PORT value resolved for development: $SERVICE_PORT"
          exit 1
        fi

        umask 077
        {
          printf 'ACADEMICO_LOGIN_IMAGE=%s\n' "$IMAGE"
          printf 'PORT=%s\n' "$SERVICE_PORT"
          printf 'NODE_ENV=production\n'
          printf 'LOGIN_API_KEY=%s\n' "$LOGIN_API_KEY"
          printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
          printf 'JWT_DOC_SECRET=%s\n' "$JWT_DOC_SECRET"
          printf 'JWT_ACCESS_TTL=%s\n' "$JWT_ACCESS_TTL"
          printf 'JWT_REFRESH_TTL=%s\n' "$JWT_REFRESH_TTL"
          printf 'DB_HOST=%s\n' "$DB_HOST"
          printf 'DB_PORT=%s\n' "$DB_PORT"
          printf 'DB_DATABASE=%s\n' "$DB_DATABASE"
          printf 'DB_USER=%s\n' "$DB_USER"
          printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD"
        } > "$ENV_FILE_LOCAL"

        echo "Updating development .env and compose file..."
        mv "$ENV_FILE_LOCAL" "$REMOTE_APP_PATH/.env.pipeline"
        mv "$REMOTE_APP_PATH/.env.pipeline" "$REMOTE_APP_PATH/.env"
        chmod 600 "$REMOTE_APP_PATH/.env"
        cp "$COMPOSE_SOURCE_FILE" "$REMOTE_APP_PATH/$DEV_COMPOSE_FILE"

        cd "$REMOTE_APP_PATH"

        container_is_running() {
          docker ps --filter "name=^/${CONTAINER_NAME}$" --filter "status=running" --format '{{.Names}}' | grep -qx "$CONTAINER_NAME"
        }

        show_port_usage() {
          local service_port=""
          if [ -f .env ]; then
            service_port="$(sed -n 's/^PORT=//p' .env | tail -n 1 || true)"
          fi

          if [ -n "$service_port" ]; then
            echo "Containers publishing port $service_port:"
            docker ps --format 'table {{.ID}}\t{{.Names}}\t{{.Image}}\t{{.Ports}}' | awk -v port="$service_port" 'NR == 1 || index($0, ":" port "->") > 0'
          fi
        }

        start_compose() {
          local compose_file="$1"
          if ! docker compose --env-file .env -f "$compose_file" up -d --remove-orphans; then
            echo "Docker Compose reported a startup error. Waiting before checking container state..."
            sleep 8
            if container_is_running; then
              echo "Container $CONTAINER_NAME is running after the startup error; continuing."
              return 0
            fi

            show_port_usage
            return 1
          fi
        }

        if [ -f docker-compose.yml ]; then
          echo "Stopping current compose project..."
          docker compose -f docker-compose.yml down --remove-orphans || true
        fi

        echo "Stopping previous pipeline compose project..."
        docker compose -f "$DEV_COMPOSE_FILE" down --remove-orphans || true

        echo "Pulling development image..."
        docker compose -f "$DEV_COMPOSE_FILE" pull

        echo "Starting development compose project..."
        start_compose "$DEV_COMPOSE_FILE"

        echo "Verifying container is running..."
        sleep 8
        if ! container_is_running; then
          echo "Container $CONTAINER_NAME did not stay running."
          show_port_usage
          docker ps -a --filter "name=^/${CONTAINER_NAME}$"
          docker logs --tail 200 "$CONTAINER_NAME" || true
          exit 1
        fi

        docker compose -f "$DEV_COMPOSE_FILE" ps

        echo "Cleaning up dangling images..."
        docker image prune -f

        echo "Development deployment completed."
      displayName: Deploy academico-login to development
      env:
        CONTAINER_REGISTRY: $(containerRegistry)
        IMAGE_REPOSITORY: $(imageRepository)
        TAG: $(tag)
        CONTAINER_NAME: $(containerName)
        REMOTE_APP_PATH: $(devRemoteAppPath)
        DEV_COMPOSE_FILE: $(devComposeFile)
        COMPOSE_SOURCE_FILE: $(Build.SourcesDirectory)/$(devComposeFile)
        DEFAULT_SERVICE_PORT: $(servicePort)
        LOGIN_API_KEY: $(LOGIN_API_KEY)
        JWT_SECRET: $(JWT_SECRET)
        JWT_DOC_SECRET: $(JWT_DOC_SECRET)
        JWT_ACCESS_TTL: $(JWT_ACCESS_TTL)
        JWT_REFRESH_TTL: $(JWT_REFRESH_TTL)
        DB_HOST: $(DB_HOST)
        DB_PORT: $(DB_PORT)
        DB_DATABASE: $(DB_DATABASE)
        DB_USER: $(DB_USER)
        DB_PASSWORD: $(DB_PASSWORD)

- stage: ApproveProduction
  displayName: Approve production deployment
  dependsOn: DeployDevelopment
  condition: succeeded()
  jobs:
  - job: WaitForProductionApproval
    displayName: Await production approval
    pool: server
    timeoutInMinutes: 1440
    steps:
    - task: ManualValidation@1
      displayName: Approve production deployment
      timeoutInMinutes: 1440
      inputs:
        notifyUsers: 'gacalderonr@utn.edu.ec'
        approvers: 'gacalderonr@utn.edu.ec'
        allowApproversToApproveTheirOwnRuns: true
        instructions: 'Approve to deploy academico-login to production server 20.115.132.131.'
        onTimeout: reject

- stage: DeployProduction
  displayName: Deploy to production
  dependsOn: ApproveProduction
  condition: succeeded()
  jobs:
  - job: DeployProduction
    displayName: Deploy Docker Compose on production server
    pool:
      name: $(devAgentPool)
      demands:
      - Agent.Name -equals $(devAgentName)
    steps:
    - task: Docker@2
      displayName: Login to Azure Container Registry
      inputs:
        command: login
        containerRegistry: $(dockerRegistryServiceConnection)

    - script: |
        set -euo pipefail

        require_env() {
          local name="$1"
          if [ -z "${!name:-}" ]; then
            echo "Missing required environment variable: $name"
            exit 1
          fi
        }

        extract_db_env() {
          local file="$1"

          awk -F= '
            BEGIN {
              split("DB_HOST DB_PORT DB_DATABASE DB_USER DB_PASSWORD", required, " ")
            }
            /^[[:space:]]*($|#)/ {
              next
            }
            /^[A-Za-z_][A-Za-z0-9_]*=/ {
              key=$1
              if (key ~ /^DB_(HOST|PORT|DATABASE|USER|PASSWORD|SSLMODE)$/) {
                values[key]=substr($0, length(key)+2)
              }
            }
            END {
              missing=0
              for (i=1; i<=5; i++) {
                key=required[i]
                if (!(key in values) || values[key]=="") {
                  printf "Missing required production DB credential: %s\n", key > "/dev/stderr"
                  missing=1
                }
              }
              if (missing) {
                exit 1
              }

              for (i=1; i<=5; i++) {
                key=required[i]
                print key "=" values[key]
              }
              if (("DB_SSLMODE" in values) && values["DB_SSLMODE"] != "") {
                print "DB_SSLMODE=" values["DB_SSLMODE"]
              }
            }
          ' "$file"
        }

        for name in PROD_SSH_PRIVATE_KEY_B64 PROD_DB_CREDENTIALS_FILE; do
          require_env "$name"
        done

        if [ ! -f "$PROD_DB_CREDENTIALS_FILE" ]; then
          echo "Missing production DB credentials file: $PROD_DB_CREDENTIALS_FILE"
          exit 1
        fi

        IMAGE="${CONTAINER_REGISTRY}/${IMAGE_REPOSITORY}:${TAG}"
        SSH_DIR="$(mktemp -d)"

        cleanup() {
          rm -rf "$SSH_DIR"
        }
        trap cleanup EXIT

        if [ ! -f "$COMPOSE_SOURCE_FILE" ]; then
          echo "Missing compose source file: $COMPOSE_SOURCE_FILE"
          exit 1
        fi

        mkdir -p "$SSH_DIR"
        chmod 700 "$SSH_DIR"
        printf '%s' "$PROD_SSH_PRIVATE_KEY_B64" | base64 -d > "$SSH_DIR/key"
        chmod 600 "$SSH_DIR/key"
        ssh-keyscan -T 10 "$PROD_SSH_HOST" > "$SSH_DIR/known_hosts"

        SSH_OPTS=(
          -i "$SSH_DIR/key"
          -o IdentitiesOnly=yes
          -o UserKnownHostsFile="$SSH_DIR/known_hosts"
          -o StrictHostKeyChecking=yes
        )
        REMOTE="${PROD_SSH_USER}@${PROD_SSH_HOST}"

        DOCKER_CONFIG_FILE="${DOCKER_CONFIG:-$HOME/.docker}/config.json"
        if [ ! -f "$DOCKER_CONFIG_FILE" ]; then
          echo "Missing Docker config after ACR login: $DOCKER_CONFIG_FILE"
          exit 1
        fi

        echo "Copying ACR Docker login to production server..."
        ssh "${SSH_OPTS[@]}" "$REMOTE" "mkdir -p ~/.docker && umask 077 && cat > ~/.docker/config.json" < "$DOCKER_CONFIG_FILE"

        echo "Validating production .env database credentials..."
        EXPECTED_DB_FINGERPRINT="$(extract_db_env "$PROD_DB_CREDENTIALS_FILE" | sha256sum | awk '{print $1}')"
        REMOTE_DB_FINGERPRINT="$(
          ssh "${SSH_OPTS[@]}" "$REMOTE" \
            "REMOTE_ENV='$REMOTE_APP_PATH/.env' bash -se" << 'REMOTE_CHECK'
        set -euo pipefail

        if [ ! -f "$REMOTE_ENV" ]; then
          echo "Missing production .env: $REMOTE_ENV" >&2
          exit 1
        fi

        awk -F= '
          BEGIN {
            split("DB_HOST DB_PORT DB_DATABASE DB_USER DB_PASSWORD", required, " ")
          }
          /^[[:space:]]*($|#)/ {
            next
          }
          /^[A-Za-z_][A-Za-z0-9_]*=/ {
            key=$1
            if (key ~ /^DB_(HOST|PORT|DATABASE|USER|PASSWORD|SSLMODE)$/) {
              values[key]=substr($0, length(key)+2)
            }
          }
          END {
            missing=0
            for (i=1; i<=5; i++) {
              key=required[i]
              if (!(key in values) || values[key]=="") {
                printf "Missing required production .env key: %s\n", key > "/dev/stderr"
                missing=1
              }
            }
            if (missing) {
              exit 1
            }

            for (i=1; i<=5; i++) {
              key=required[i]
              print key "=" values[key]
            }
            if (("DB_SSLMODE" in values) && values["DB_SSLMODE"] != "") {
              print "DB_SSLMODE=" values["DB_SSLMODE"]
            }
          }
        ' "$REMOTE_ENV" | sha256sum | awk '{print $1}'
        REMOTE_CHECK
        )"

        if [ "$REMOTE_DB_FINGERPRINT" != "$EXPECTED_DB_FINGERPRINT" ]; then
          echo "Production .env DB credentials do not match $PROD_DB_CREDENTIALS_FILE."
          echo "Refusing to overwrite production .env. Update the remote .env with the production DB credentials and rerun."
          exit 1
        fi

        echo "Updating production compose file..."
        ssh "${SSH_OPTS[@]}" "$REMOTE" "mkdir -p '$REMOTE_APP_PATH'"
        ssh "${SSH_OPTS[@]}" "$REMOTE" "cat > '$REMOTE_APP_PATH/$PROD_COMPOSE_FILE'" < "$COMPOSE_SOURCE_FILE"

        echo "Deploying with Docker Compose..."
        ssh "${SSH_OPTS[@]}" "$REMOTE" \
          "REMOTE_APP_PATH='$REMOTE_APP_PATH' PROD_COMPOSE_FILE='$PROD_COMPOSE_FILE' CONTAINER_NAME='$CONTAINER_NAME' ACADEMICO_LOGIN_IMAGE='$IMAGE' bash -se" << 'REMOTE_SCRIPT'
        set -euo pipefail

        cd "$REMOTE_APP_PATH"

        require_env_file_key() {
          local name="$1"
          local value=""

          value="$(sed -n "s/^${name}=//p" .env | tail -n 1 || true)"
          if [ -z "$value" ]; then
            echo "Missing required production .env key: $name"
            exit 1
          fi
        }

        for name in PORT NODE_ENV LOGIN_API_KEY JWT_SECRET JWT_DOC_SECRET JWT_ACCESS_TTL JWT_REFRESH_TTL DB_HOST DB_PORT DB_DATABASE DB_USER DB_PASSWORD; do
          require_env_file_key "$name"
        done

        SERVICE_PORT="$(sed -n 's/^PORT=//p' .env | tail -n 1 || true)"
        if [[ ! "$SERVICE_PORT" =~ ^[0-9]+$ ]]; then
          echo "Invalid PORT value in production .env: $SERVICE_PORT"
          exit 1
        fi

        container_is_running() {
          docker ps --filter "name=^/${CONTAINER_NAME}$" --filter "status=running" --format '{{.Names}}' | grep -qx "$CONTAINER_NAME"
        }

        show_port_usage() {
          local service_port=""
          if [ -f .env ]; then
            service_port="$(sed -n 's/^PORT=//p' .env | tail -n 1 || true)"
          fi

          if [ -n "$service_port" ]; then
            echo "Containers publishing port $service_port:"
            docker ps --format 'table {{.ID}}\t{{.Names}}\t{{.Image}}\t{{.Ports}}' | awk -v port="$service_port" 'NR == 1 || index($0, ":" port "->") > 0'
          fi
        }

        start_compose() {
          local compose_file="$1"
          if ! docker compose -f "$compose_file" up -d --remove-orphans; then
            echo "Docker Compose reported a startup error. Waiting before checking container state..."
            sleep 8
            if container_is_running; then
              echo "Container $CONTAINER_NAME is running after the startup error; continuing."
              return 0
            fi

            show_port_usage
            return 1
          fi
        }

        if [ -f docker-compose.yml ]; then
          echo "Stopping current compose project..."
          docker compose --env-file .env -f docker-compose.yml down --remove-orphans || true
        fi

        echo "Stopping previous pipeline compose project..."
        docker compose --env-file .env -f "$PROD_COMPOSE_FILE" down --remove-orphans || true

        echo "Pulling production image..."
        docker compose --env-file .env -f "$PROD_COMPOSE_FILE" pull

        echo "Starting production compose project..."
        start_compose "$PROD_COMPOSE_FILE"

        echo "Verifying container is running..."
        sleep 8
        if ! container_is_running; then
          echo "Container $CONTAINER_NAME did not stay running."
          show_port_usage
          docker ps -a --filter "name=^/${CONTAINER_NAME}$"
          docker logs --tail 200 "$CONTAINER_NAME" || true
          exit 1
        fi

        docker compose --env-file .env -f "$PROD_COMPOSE_FILE" ps

        echo "Cleaning up dangling images..."
        docker image prune -f

        echo "Deployment completed."
        REMOTE_SCRIPT
      displayName: Deploy academico-login with Docker Compose
      env:
        CONTAINER_REGISTRY: $(containerRegistry)
        IMAGE_REPOSITORY: $(imageRepository)
        TAG: $(tag)
        CONTAINER_NAME: $(containerName)
        PROD_SSH_HOST: $(prodSshHost)
        PROD_SSH_USER: $(prodSshUser)
        REMOTE_APP_PATH: $(prodRemoteAppPath)
        PROD_COMPOSE_FILE: $(prodComposeFile)
        COMPOSE_SOURCE_FILE: $(Build.SourcesDirectory)/$(prodComposeFile)
        PROD_SSH_PRIVATE_KEY_B64: $(PROD_SSH_PRIVATE_KEY_B64)
        PROD_DB_CREDENTIALS_FILE: $(prodDbCredentialsFile)
