# Reusable Docker pipeline template for academic microservices.
#
# Usage:
# 1. Copy this file to azure-pipelines.yml in the target microservice.
# 2. Adjust the parameters below for the service name, image repository,
#    compose file, Kubernetes manifests, paths, ports and environment variables.
# 3. Create the referenced secret variables in Azure DevOps before running
#    the pipeline. Example: DB_PASSWORD, NOTIFICACIONES_API_KEY, JWT_SECRET.
#
# Runtime model:
# - Build runs on an Azure hosted agent and pushes the image to ACR.
# - Development deploys automatically on this VM through the self-hosted agent.
# - Production waits for ManualValidation and then deploys to Kubernetes over SSH.
#
# Development Compose requirement:
# - The compose file must exist in the repo, usually docker-compose.yml.
# - Its image line should reference the configured imageEnvVariableName. Example:
#     image: ${SERVICE_IMAGE}
# - For single-port services, use PORT from .env. Example:
#     ports:
#       - "${PORT}:${PORT}"
#
# Production Kubernetes requirement:
# - scripts/deploy_k8s_production.sh must exist in the repo.
# - k8sManifestDir must contain the production manifests, usually k8s/prod.
# - The deployment manifest must contain the configured k8sContainer name.
# - appPort should match the application PORT and the manifest containerPort.

parameters:
- name: dockerRegistryServiceConnection
  type: string
  default: '5cffc302-0a35-4b2b-8ea1-04a9ebd67c07'

- name: containerRegistry
  type: string
  default: 'acracademicoutn.azurecr.io'

- name: imageRepository
  type: string
  default: 'academicmgmtorgacademicomicroservicio'

- name: containerName
  type: string
  default: 'academico-microservicio'

- name: dockerfilePath
  type: string
  default: '$(Build.SourcesDirectory)/Dockerfile'

- name: vmImageName
  type: string
  default: 'ubuntu-latest'

- name: devAgentPool
  type: string
  default: 'Default'

- name: devAgentName
  type: string
  default: 'self-hosted-agent'

- name: developmentVariableGroup
  type: string
  default: 'academico-microservicio-dev'

- name: productionVariableGroup
  type: string
  default: 'academico-microservicio-prod'

- name: devRemoteAppPath
  type: string
  default: '/home/azureuser/academico-microservicio'

- name: prodSshHost
  type: string
  default: '20.115.132.131'

- name: prodSshUser
  type: string
  default: 'azureuser'

- name: prodSshPrivateKeyB64
  type: string
  default: '$(PROD_SSH_PRIVATE_KEY_B64)'

- name: devComposeFile
  type: string
  default: 'docker-compose.yml'

# Development fallback for PORT when the remote .env does not exist yet.
- name: servicePort
  type: string
  default: ''

# Production Kubernetes PORT value written into appSecretName.
- name: appPort
  type: string
  default: ''

- name: k8sNamespace
  type: string
  default: 'academico-prod'

- name: k8sManifestDir
  type: string
  default: '$(Build.SourcesDirectory)/k8s/prod'

- name: k8sRemoteManifestPath
  type: string
  default: '/tmp/academico-microservicio-k8s-manifests'

- name: k8sDeployment
  type: string
  default: 'academico-microservicio'

- name: k8sContainer
  type: string
  default: 'academico-microservicio'

- name: imagePullSecretName
  type: string
  default: 'acr-pull-secret'

- name: appSecretName
  type: string
  default: 'academico-microservicio-env'

- name: rolloutTimeout
  type: string
  default: '5m'

# Name of the .env key used by docker compose for the pushed image.
# The compose file must reference this variable in its image property.
- name: imageEnvVariableName
  type: string
  default: 'SERVICE_IMAGE'

# Space-separated list of application variables managed by the pipeline.
# Development writes these keys into the remote .env file, and production writes
# them into appSecretName. PORT and the image variable are intentionally omitted:
# development reads PORT from the existing remote .env or servicePort, production
# writes PORT from appPort, and the image variable is only generated for Compose.
# The build also publishes latest for consumers that need the newest image tag.
- name: envVariableNames
  type: string
  default: 'NODE_ENV SERVICE_API_KEY DB_HOST DB_PORT DB_DATABASE DB_USER DB_PASSWORD'

# Space-separated list of .env keys that the generator should leave server-local
# during automatic discovery. These keys are preserved from the existing remote
# development .env instead of being required as Azure DevOps variables.
- name: preservedEnvVariableNames
  type: string
  default: 'PASSWORD_RESET_TTL_MINUTES PASSWORD_RESET_THROTTLE_SECONDS'

# Values injected into the .env creation step. Use Azure DevOps secret variables
# for sensitive values and plain literals for non-sensitive values.
- name: envVariables
  type: object
  default:
    NODE_ENV: 'production'
    SERVICE_API_KEY: '$(SERVICE_API_KEY)'
    DB_HOST: '$(DB_HOST)'
    DB_PORT: '$(DB_PORT)'
    DB_DATABASE: '$(DB_DATABASE)'
    DB_USER: '$(DB_USER)'
    DB_PASSWORD: '$(DB_PASSWORD)'

- name: productionApprovalNotifyUsers
  type: string
  default: 'gacalderonr@utn.edu.ec'

- name: productionApprovers
  type: string
  default: 'gacalderonr@utn.edu.ec'

- name: productionApprovalInstructions
  type: string
  default: 'Approve to deploy this microservice to the production Kubernetes cluster.'

trigger:
- main

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: ${{ parameters.vmImageName }}
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: Use Node.js

    - script: npm ci
      displayName: Install dependencies

    - script: |
        set -euo pipefail
        mkdir -p quality-gates

        require_env() {
          local name="$1"
          local value="${!name:-}"
          if [ -z "$value" ] || [[ "$value" == '$('*')' ]]; then
            echo "Pipeline/runtime variable is not set: $name. Define it in the YAML env block or Azure DevOps variables before running this pipeline."
            exit 1
          fi
        }

        require_env DB_HOST
        require_env DB_PORT
        require_env DB_DATABASE
        require_env DB_USER
        require_env DB_PASSWORD
        require_env DB_SSLMODE

        npm run test:cov -- --coverageReporters=json --watchAll=false
        npm audit --json --audit-level=critical --package-lock-only > quality-gates/npm-audit.json || true
        npx eslint "{src,apps,libs,test}/**/*.ts" --format json --no-error-on-unmatched-pattern > quality-gates/eslint.json || true

        node <<'NODE'
        const fs = require('node:fs');

        function readJson(path, fallback) {
          try {
            return JSON.parse(fs.readFileSync(path, 'utf8'));
          } catch {
            return fallback;
          }
        }

        function number(value) {
          const parsed = Number(value);
          return Number.isFinite(parsed) ? parsed : -1;
        }

        function percent(metric) {
          return metric.total > 0
            ? Math.round((metric.covered / metric.total) * 10000) / 100
            : -1;
        }

        function coverageFromIstanbulFinal(path) {
          const report = readJson(path, {});
          const totals = {
            lines: { total: 0, covered: 0 },
            statements: { total: 0, covered: 0 },
            branches: { total: 0, covered: 0 },
            functions: { total: 0, covered: 0 },
          };

          for (const file of Object.values(report)) {
            const lineHits = new Map();

            for (const [statementId, location] of Object.entries(file?.statementMap || {})) {
              const line = Number(location?.start?.line);
              if (!Number.isFinite(line)) {
                continue;
              }

              const hits = Number(file?.s?.[statementId] || 0);
              lineHits.set(line, Math.max(lineHits.get(line) || 0, hits));
            }

            totals.lines.total += lineHits.size;
            totals.lines.covered += [...lineHits.values()].filter((hits) => hits > 0).length;

            const statementHits = Object.values(file?.s || {}).map(Number);
            totals.statements.total += statementHits.length;
            totals.statements.covered += statementHits.filter((hits) => hits > 0).length;

            const functionHits = Object.values(file?.f || {}).map(Number);
            totals.functions.total += functionHits.length;
            totals.functions.covered += functionHits.filter((hits) => hits > 0).length;

            for (const branchHits of Object.values(file?.b || {})) {
              for (const hits of branchHits || []) {
                totals.branches.total += 1;
                totals.branches.covered += Number(hits) > 0 ? 1 : 0;
              }
            }
          }

          return {
            lines: percent(totals.lines),
            statements: percent(totals.statements),
            branches: percent(totals.branches),
            functions: percent(totals.functions),
          };
        }

        const coverage = coverageFromIstanbulFinal('coverage/coverage-final.json');
        const audit = readJson('quality-gates/npm-audit.json', {});
        const eslintResults = readJson('quality-gates/eslint.json', []);

        const criticalVulnerabilities = Number.isFinite(Number(audit?.metadata?.vulnerabilities?.critical))
          ? Number(audit.metadata.vulnerabilities.critical)
          : audit?.vulnerabilities && typeof audit.vulnerabilities === 'object'
            ? Object.values(audit.vulnerabilities).filter((vulnerability) => vulnerability?.severity === 'critical').length
            : -1;

        const criticalBugs = Array.isArray(eslintResults)
          ? eslintResults.reduce((total, result) => {
              const fatalErrorCount = Number(result?.fatalErrorCount);
              if (Number.isFinite(fatalErrorCount)) {
                return total + fatalErrorCount;
              }

              const fatalMessages = Array.isArray(result?.messages)
                ? result.messages.filter((message) => message?.fatal === true && message?.severity === 2)
                : [];
              return total + fatalMessages.length;
            }, 0)
          : -1;

        const summary = {
          coverage: {
            lines: number(coverage.lines),
            statements: number(coverage.statements),
            branches: number(coverage.branches),
            functions: number(coverage.functions),
          },
          vulnerabilities: {
            critical: criticalVulnerabilities,
          },
          bugs: {
            critical: criticalBugs,
          },
          metadata: {
            service: process.env.BUILD_REPOSITORY_NAME || 'academico-notificaciones',
            commit: process.env.BUILD_SOURCEVERSION || '',
            buildId: process.env.BUILD_BUILDID || '',
            generatedAt: new Date().toISOString(),
          },
        };

        fs.writeFileSync('quality-gates/quality-gates-summary.json', `${JSON.stringify(summary, null, 2)}\n`);
        console.log(JSON.stringify(summary, null, 2));
        NODE
      displayName: Generate quality gates summary
      env:
        DB_HOST: $(DB_HOST)
        DB_PORT: $(DB_PORT)
        DB_DATABASE: $(DB_DATABASE)
        DB_USER: $(DB_USER)
        DB_PASSWORD: $(DB_PASSWORD)
        DB_SSLMODE: $(DB_SSLMODE)

    - script: test -f quality-gates/quality-gates-summary.json
      displayName: Verify quality gates summary

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: $(Build.SourcesDirectory)/quality-gates/quality-gates-summary.json
        ArtifactName: quality-gates-summary
        publishLocation: Container
      displayName: Publish quality-gates-summary.json

    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: ${{ parameters.imageRepository }}
        dockerfile: ${{ parameters.dockerfilePath }}
        containerRegistry: ${{ parameters.dockerRegistryServiceConnection }}
        tags: |
          $(tag)
          latest
        addPipelineData: false

- stage: DeployDevelopment
  displayName: Deploy to development
  dependsOn: Build
  condition: succeeded()
  variables:
  - group: ${{ parameters.developmentVariableGroup }}
  jobs:
  - job: DeployDevelopment
    displayName: Deploy Docker Compose on development server
    pool:
      name: ${{ parameters.devAgentPool }}
      demands:
      - Agent.Name -equals ${{ parameters.devAgentName }}
    steps:
    - task: Docker@2
      displayName: Login to Azure Container Registry
      inputs:
        command: login
        containerRegistry: ${{ parameters.dockerRegistryServiceConnection }}

    - script: |
        set -euo pipefail

        require_env() {
          local name="$1"
          if [ -z "${!name:-}" ]; then
            echo "Missing required environment variable: $name"
            exit 1
          fi
        }

        validate_env_name() {
          local name="$1"
          if [[ ! "$name" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]]; then
            echo "Invalid environment variable name: $name"
            exit 1
          fi
        }

        merge_env_file() {
          local existing_file="$1"
          local generated_file="$2"
          local output_file="$3"

          if [ -f "$existing_file" ]; then
            awk '
              FNR == NR {
                if ($0 ~ /^[A-Za-z_][A-Za-z0-9_]*=/) {
                  split($0, parts, "=")
                  managed[parts[1]] = 1
                }
                generated[++generated_count] = $0
                next
              }
              {
                if ($0 ~ /^[A-Za-z_][A-Za-z0-9_]*=/) {
                  split($0, parts, "=")
                  if (parts[1] in managed) {
                    next
                  }
                }
                print
              }
              END {
                for (i = 1; i <= generated_count; i++) {
                  print generated[i]
                }
              }
            ' "$generated_file" "$existing_file" > "$output_file"
          else
            cp "$generated_file" "$output_file"
          fi
        }

        validate_env_name "$IMAGE_ENV_VARIABLE_NAME"

        for name in $ENV_VARIABLE_NAMES; do
          validate_env_name "$name"
          require_env "$name"
        done

        IMAGE="${CONTAINER_REGISTRY}/${IMAGE_REPOSITORY}:${TAG}"
        ENV_FILE_GENERATED="$(mktemp)"
        ENV_FILE_LOCAL="$(mktemp)"

        cleanup() {
          rm -f "$ENV_FILE_GENERATED" "$ENV_FILE_LOCAL"
        }
        trap cleanup EXIT

        if [ ! -f "$COMPOSE_SOURCE_FILE" ]; then
          echo "Missing compose source file: $COMPOSE_SOURCE_FILE"
          exit 1
        fi

        mkdir -p "$REMOTE_APP_PATH"

        echo "Reading development service port..."
        ENV_FILE="$REMOTE_APP_PATH/.env"
        SERVICE_PORT=""
        if [ -f "$ENV_FILE" ]; then
          SERVICE_PORT="$(sed -n 's/^PORT=//p' "$ENV_FILE" | tail -n 1)"
        fi

        if [ -z "$SERVICE_PORT" ]; then
          if [ -z "${DEFAULT_SERVICE_PORT:-}" ]; then
            echo "No PORT found in $ENV_FILE and servicePort was not configured."
            exit 1
          fi
          echo "No PORT found in $ENV_FILE. Using configured servicePort $DEFAULT_SERVICE_PORT."
          SERVICE_PORT="$DEFAULT_SERVICE_PORT"
        fi

        if [[ ! "$SERVICE_PORT" =~ ^[0-9]+$ ]]; then
          echo "Invalid PORT value resolved for development: $SERVICE_PORT"
          exit 1
        fi

        umask 077
        {
          printf '%s=%s\n' "$IMAGE_ENV_VARIABLE_NAME" "$IMAGE"
          printf 'PORT=%s\n' "$SERVICE_PORT"
          for name in $ENV_VARIABLE_NAMES; do
            printf '%s=%s\n' "$name" "${!name}"
          done
        } > "$ENV_FILE_GENERATED"

        merge_env_file "$ENV_FILE" "$ENV_FILE_GENERATED" "$ENV_FILE_LOCAL"

        echo "Updating development .env and compose file..."
        mv "$ENV_FILE_LOCAL" "$REMOTE_APP_PATH/.env.pipeline"
        mv "$REMOTE_APP_PATH/.env.pipeline" "$REMOTE_APP_PATH/.env"
        chmod 600 "$REMOTE_APP_PATH/.env"
        cp "$COMPOSE_SOURCE_FILE" "$REMOTE_APP_PATH/$DEV_COMPOSE_FILE"

        cd "$REMOTE_APP_PATH"

        container_is_running() {
          docker ps --filter "name=^/${CONTAINER_NAME}$" --filter "status=running" --format '{{.Names}}' | grep -qx "$CONTAINER_NAME"
        }

        show_port_usage() {
          local service_port=""
          if [ -f .env ]; then
            service_port="$(sed -n 's/^PORT=//p' .env | tail -n 1 || true)"
          fi

          if [ -n "$service_port" ]; then
            echo "Containers publishing port $service_port:"
            docker ps --format 'table {{.ID}}\t{{.Names}}\t{{.Image}}\t{{.Ports}}' | awk -v port="$service_port" 'NR == 1 || index($0, ":" port "->") > 0'
          fi
        }

        ensure_docker_network() {
          local network_name="$1"
          if docker network inspect "$network_name" >/dev/null 2>&1; then
            return
          fi

          echo "Creating Docker network $network_name..."
          docker network create "$network_name" >/dev/null
        }

        start_compose() {
          local compose_file="$1"
          if ! docker compose -f "$compose_file" up -d --remove-orphans; then
            echo "Docker Compose reported a startup error. Waiting before checking container state..."
            sleep 8
            if container_is_running; then
              echo "Container $CONTAINER_NAME is running after the startup error; continuing."
              return 0
            fi

            show_port_usage
            return 1
          fi
        }

        if [ -f docker-compose.yml ]; then
          echo "Stopping current compose project..."
          docker compose -f docker-compose.yml down --remove-orphans || true
        fi

        echo "Stopping previous pipeline compose project..."
        docker compose -f "$DEV_COMPOSE_FILE" down --remove-orphans || true

        ensure_docker_network academico-backend

        echo "Pulling development image..."
        docker compose -f "$DEV_COMPOSE_FILE" pull

        echo "Starting development compose project..."
        start_compose "$DEV_COMPOSE_FILE"

        echo "Verifying container is running..."
        sleep 8
        if ! container_is_running; then
          echo "Container $CONTAINER_NAME did not stay running."
          show_port_usage
          docker ps -a --filter "name=^/${CONTAINER_NAME}$"
          docker logs --tail 200 "$CONTAINER_NAME" || true
          exit 1
        fi

        docker compose -f "$DEV_COMPOSE_FILE" ps

        echo "Cleaning up dangling images..."
        docker image prune -f

        echo "Development deployment completed."
      displayName: Deploy to development with Docker Compose
      env:
        CONTAINER_REGISTRY: ${{ parameters.containerRegistry }}
        IMAGE_REPOSITORY: ${{ parameters.imageRepository }}
        TAG: $(tag)
        CONTAINER_NAME: ${{ parameters.containerName }}
        REMOTE_APP_PATH: ${{ parameters.devRemoteAppPath }}
        DEV_COMPOSE_FILE: ${{ parameters.devComposeFile }}
        COMPOSE_SOURCE_FILE: $(Build.SourcesDirectory)/${{ parameters.devComposeFile }}
        IMAGE_ENV_VARIABLE_NAME: ${{ parameters.imageEnvVariableName }}
        ENV_VARIABLE_NAMES: ${{ parameters.envVariableNames }}
        DEFAULT_SERVICE_PORT: '${{ parameters.servicePort }}'
        ${{ each envVar in parameters.envVariables }}:
          ${{ envVar.key }}: ${{ envVar.value }}

- stage: ApproveProduction
  displayName: Approve production deployment
  dependsOn: DeployDevelopment
  condition: succeeded()
  jobs:
  - job: WaitForProductionApproval
    displayName: Await production approval
    pool: server
    timeoutInMinutes: 1440
    steps:
    - task: ManualValidation@1
      displayName: Approve production deployment
      timeoutInMinutes: 1440
      inputs:
        notifyUsers: ${{ parameters.productionApprovalNotifyUsers }}
        approvers: ${{ parameters.productionApprovers }}
        allowApproversToApproveTheirOwnRuns: true
        instructions: ${{ parameters.productionApprovalInstructions }}
        onTimeout: reject

- stage: DeployProduction
  displayName: Deploy to production
  dependsOn: ApproveProduction
  condition: succeeded()
  variables:
  - group: ${{ parameters.productionVariableGroup }}
  jobs:
  - job: DeployProduction
    displayName: Deploy ${{ parameters.containerName }} to production Kubernetes
    pool:
      vmImage: ${{ parameters.vmImageName }}
    steps:
    - task: Docker@2
      displayName: Login to Azure Container Registry
      inputs:
        command: login
        containerRegistry: ${{ parameters.dockerRegistryServiceConnection }}

    - script: |
        bash "$(Build.SourcesDirectory)/scripts/deploy_k8s_production.sh"
      displayName: Deploy to production Kubernetes
      env:
        CONTAINER_REGISTRY: ${{ parameters.containerRegistry }}
        IMAGE_REPOSITORY: ${{ parameters.imageRepository }}
        TAG: $(tag)
        K8S_SSH_HOST: ${{ parameters.prodSshHost }}
        K8S_SSH_USER: ${{ parameters.prodSshUser }}
        K8S_SSH_PRIVATE_KEY_B64: ${{ parameters.prodSshPrivateKeyB64 }}
        K8S_NAMESPACE: ${{ parameters.k8sNamespace }}
        K8S_MANIFEST_DIR: ${{ parameters.k8sManifestDir }}
        K8S_REMOTE_MANIFEST_PATH: ${{ parameters.k8sRemoteManifestPath }}
        K8S_DEPLOYMENT: ${{ parameters.k8sDeployment }}
        K8S_CONTAINER: ${{ parameters.k8sContainer }}
        IMAGE_PULL_SECRET_NAME: ${{ parameters.imagePullSecretName }}
        APP_SECRET_NAME: ${{ parameters.appSecretName }}
        ROLLOUT_TIMEOUT: ${{ parameters.rolloutTimeout }}
        APP_PORT: '${{ parameters.appPort }}'
        ENV_VARIABLE_NAMES: ${{ parameters.envVariableNames }}
        ${{ each envVar in parameters.envVariables }}:
          ${{ envVar.key }}: ${{ envVar.value }}
